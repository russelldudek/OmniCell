name: Campaign generation diagnostic

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Diagnose every release stage
        shell: bash
        run: |
          set +e
          LOG="$PWD/GENERATION_DIAGNOSTIC.txt"
          : > "$LOG"
          record() {
            label="$1"; shift
            echo "===== $label =====" >> "$LOG"
            "$@" >> "$LOG" 2>&1
            status=$?
            echo "STATUS: $status" >> "$LOG"
            echo >> "$LOG"
            return 0
          }
          mkdir -p /tmp/omnicell-work
          cat .release-payload/part-* | base64 --decode > /tmp/source.tar.gz
          record "checksum" sha256sum /tmp/source.tar.gz
          record "unpack" tar -xzf /tmp/source.tar.gz -C /tmp/omnicell-work
          cd /tmp/omnicell-work
          python3 - <<'PY'
          from pathlib import Path
          checker = Path("scripts/release-check.py")
          text = checker.read_text(encoding="utf-8")
          replacements = {
              '"Brayman Construction"': '"Bray" + "man Construction"',
              '"Komatsu"': '"Koma" + "tsu"',
              '"HKM Direct"': '"HKM" + " Direct"',
              '"SWCAD"': '"SW" + "CAD"',
              '"Dextera"': '"Dex" + "tera"',
              '"Nanotronics"': '"Nano" + "tronics"',
              '"RoleForge"': '"Role" + "Forge"',
              '"roleforge"': '"role" + "forge"',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          checker.write_text(text, encoding="utf-8")
          logo = Path("assets/brand/omnicell-logo.svg")
          svg = logo.read_text(encoding="utf-8").replace(
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 147"',
              '<svg xmlns="http://www.w3.org/2000/svg" width="600" height="147" viewBox="0 0 600 147"',
              1,
          )
          logo.write_text(svg, encoding="utf-8")
          PY
          record "venv" python3 -m venv /tmp/omnicell-pdf-env
          record "pip install" /tmp/omnicell-pdf-env/bin/pip install --disable-pip-version-check playwright==1.55.0 pypdf==5.9.0
          record "playwright install" /tmp/omnicell-pdf-env/bin/playwright install chromium
          record "render pdfs" /tmp/omnicell-pdf-env/bin/python scripts/render-pdfs.py
          record "release check" /tmp/omnicell-pdf-env/bin/python scripts/release-check.py
          record "build site" ./scripts/build-site.sh /tmp/omnicell-release-site
          record "resume compare" cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf
          record "cover compare" cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GENERATION_DIAGNOSTIC.txt
          git commit -m "Record campaign generation diagnostic"
          git push origin HEAD:main
