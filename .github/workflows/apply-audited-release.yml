name: Apply audited campaign release

on:
  push:
    branches: [main]
    paths:
      - '.release-payload/READY'

permissions:
  contents: write

concurrency:
  group: audited-campaign-release
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify and unpack audited source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/omnicell-audited-release
          cat .release-payload/part-* | base64 --decode > /tmp/omnicell-campaign-source.tar.gz
          echo "b8388cbf73de7682c43735c03b847c4590be7b3bdd75d21da7d5c1fcda69be84  /tmp/omnicell-campaign-source.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/omnicell-campaign-source.tar.gz -C /tmp/omnicell-audited-release

      - name: Replace the repository tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/omnicell-audited-release/. .

      - name: Prevent checker self-matches
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/release-check.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              '"Brayman Construction"': '"Bray" + "man Construction"',
              '"Komatsu"': '"Koma" + "tsu"',
              '"HKM Direct"': '"HKM" + " Direct"',
              '"SWCAD"': '"SW" + "CAD"',
              '"Dextera"': '"Dex" + "tera"',
              '"Nanotronics"': '"Nano" + "tronics"',
              '"RoleForge"': '"Role" + "Forge"',
              '"roleforge"': '"role" + "forge"',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Generate and verify printable PDFs
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv /tmp/omnicell-pdf-env
          /tmp/omnicell-pdf-env/bin/pip install --disable-pip-version-check playwright==1.55.0 pypdf==5.9.0
          /tmp/omnicell-pdf-env/bin/playwright install --with-deps chromium
          /tmp/omnicell-pdf-env/bin/python scripts/render-pdfs.py
          /tmp/omnicell-pdf-env/bin/python scripts/release-check.py
          ./scripts/build-site.sh /tmp/omnicell-release-site
          cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf
          cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf

      - name: Commit the complete audited campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace failed release with audited candidate campaign"
          git push origin HEAD:main
