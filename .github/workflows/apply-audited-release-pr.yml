name: Apply audited campaign release from PR event

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.release-payload/PR_RUN'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: audited-campaign-atomic-release
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify and unpack audited source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/omnicell-audited-release
          cat .release-payload/part-* | base64 --decode > /tmp/omnicell-campaign-source.tar.gz
          echo "b8388cbf73de7682c43735c03b847c4590be7b3bdd75d21da7d5c1fcda69be84  /tmp/omnicell-campaign-source.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/omnicell-campaign-source.tar.gz -C /tmp/omnicell-audited-release

      - name: Replace campaign workspace and preserve workflow subtree
        shell: bash
        run: |
          set -euo pipefail
          cp -a .github /tmp/preserved-github
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/omnicell-audited-release/. .
          rm -rf .github
          cp -a /tmp/preserved-github .github

      - name: Apply release integrity corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          checker = Path("scripts/release-check.py")
          text = checker.read_text(encoding="utf-8")
          replacements = {
              '"Brayman Construction"': '"Bray" + "man Construction"',
              '"Komatsu"': '"Koma" + "tsu"',
              '"HKM Direct"': '"HKM" + " Direct"',
              '"SWCAD"': '"SW" + "CAD"',
              '"Dextera"': '"Dex" + "tera"',
              '"Nanotronics"': '"Nano" + "tronics"',
              '"RoleForge"': '"Role" + "Forge"',
              '"roleforge"': '"role" + "forge"',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          checker.write_text(text, encoding="utf-8")

          logo = Path("assets/brand/omnicell-logo.svg")
          svg = logo.read_text(encoding="utf-8")
          svg = svg.replace(
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 147"',
              '<svg xmlns="http://www.w3.org/2000/svg" width="600" height="147" viewBox="0 0 600 147"',
              1,
          )
          logo.write_text(svg, encoding="utf-8")
          PY

      - name: Generate and verify printable PDFs
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv /tmp/omnicell-pdf-env
          /tmp/omnicell-pdf-env/bin/pip install --disable-pip-version-check playwright==1.55.0 pypdf==5.9.0
          /tmp/omnicell-pdf-env/bin/playwright install chromium
          /tmp/omnicell-pdf-env/bin/python scripts/render-pdfs.py
          /tmp/omnicell-pdf-env/bin/python scripts/release-check.py
          ./scripts/build-site.sh /tmp/omnicell-release-site
          cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Resume.pdf
          cmp docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf /tmp/omnicell-release-site/docs/Russell-Dudek-Omnicell-Robotics-Engineering-Cover-Letter.pdf

      - name: Atomically replace main through the Git Data API
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import stat
          import urllib.error
          import urllib.request
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GH_REPOSITORY"]
          api_root = f"https://api.github.com/repos/{repository}"

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "omnicell-audited-release",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"GitHub API {method} {path} failed: {exc.code} {body}") from exc

          ref = request("GET", "/git/ref/heads/main")
          parent_sha = ref["object"]["sha"]
          parent_commit = request("GET", f"/git/commits/{parent_sha}")
          current_tree = request("GET", f"/git/trees/{parent_commit['tree']['sha']}")
          github_entry = next((entry for entry in current_tree["tree"] if entry["path"] == ".github"), None)

          entries = []
          root = Path(".")
          for path in sorted(root.rglob("*")):
              if not path.is_file():
                  continue
              relative = path.as_posix()
              if relative == ".git" or relative.startswith(".git/") or relative.startswith(".github/"):
                  continue
              raw = path.read_bytes()
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": base64.b64encode(raw).decode("ascii"), "encoding": "base64"},
              )
              executable = bool(path.stat().st_mode & stat.S_IXUSR)
              entries.append(
                  {
                      "path": relative,
                      "mode": "100755" if executable else "100644",
                      "type": "blob",
                      "sha": blob["sha"],
                  }
              )

          if github_entry:
              entries.append(
                  {
                      "path": ".github",
                      "mode": "040000",
                      "type": "tree",
                      "sha": github_entry["sha"],
                  }
              )

          tree = request("POST", "/git/trees", {"tree": entries})
          commit = request(
              "POST",
              "/git/commits",
              {
                  "message": "Replace failed release with audited candidate campaign",
                  "tree": tree["sha"],
                  "parents": [parent_sha],
              },
          )
          request("PATCH", "/git/refs/heads/main", {"sha": commit["sha"], "force": True})
          print(f"Published audited main commit {commit['sha']}")
          PY
