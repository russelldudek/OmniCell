name: Release payload diagnostic

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Inspect source payload without stopping
        shell: bash
        run: |
          set +e
          {
            echo "Release payload diagnostic"
            echo "Expected SHA: b8388cbf73de7682c43735c03b847c4590be7b3bdd75d21da7d5c1fcda69be84"
            echo "Chunk files:"
            find .release-payload -maxdepth 1 -type f -name 'part-*' -printf '%f %s bytes\n' | sort
            cat .release-payload/part-* | base64 --decode > /tmp/source.tar.gz
            decode_status=$?
            echo "Decode status: $decode_status"
            echo "Decoded bytes: $(stat -c '%s' /tmp/source.tar.gz 2>/dev/null || echo missing)"
            echo "Actual SHA: $(sha256sum /tmp/source.tar.gz 2>/dev/null | awk '{print $1}')"
            tar -tzf /tmp/source.tar.gz >/tmp/tar-list.txt 2>/tmp/tar-error.txt
            tar_status=$?
            echo "Tar status: $tar_status"
            echo "Tar entries: $(wc -l </tmp/tar-list.txt 2>/dev/null || echo 0)"
            echo "Tar error:"
            cat /tmp/tar-error.txt
          } > PAYLOAD_DIAGNOSTIC.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PAYLOAD_DIAGNOSTIC.txt
          git commit -m "Record release payload diagnostic"
          git push origin HEAD:main
