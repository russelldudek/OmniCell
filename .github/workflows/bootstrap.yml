name: Bootstrap campaign source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Expand release source
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .release/source.tgz.b64 ]]; then
            echo "Source bundle not present; nothing to expand."
            exit 0
          fi
          base64 --decode .release/source.tgz.b64 > /tmp/campaign-source.tgz
          tar -xzf /tmp/campaign-source.tgz -C .
          rm -rf .release .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete candidate campaign source"
          git push origin HEAD:main
